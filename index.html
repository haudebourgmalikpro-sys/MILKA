<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mes réseaux — Lord.milka</title>
  <style>
    :root{font-family:system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;}
    body{margin:0;display:flex;min-height:100vh;align-items:center;justify-content:center;background:#0f1724;color:#fff}
    .card{width:min(720px,92%);text-align:center;padding:36px;border-radius:14px;background:linear-gradient(180deg,rgba(255,255,255,0.03),rgba(255,255,255,0.01));box-shadow:0 6px 30px rgba(2,6,23,0.6)}
    img.avatar{width:96px;height:96px;border-radius:50%;object-fit:cover;border:3px solid rgba(255,255,255,0.06)}
    h1{margin:12px 0 6px;font-size:20px;letter-spacing:0.6px}
    p.desc{margin:0 0 18px;opacity:0.85}
    .links{display:grid;gap:10px;margin-top:8px}
    .link{display:block;padding:12px 16px;border-radius:10px;text-decoration:none;font-weight:600;background:rgba(255,255,255,0.03);color:inherit;border:1px solid rgba(255,255,255,0.03)}
    .link:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(2,6,23,0.5);transition:all .12s}
    .small{margin-top:16px;font-size:13px;opacity:0.7}
    .icons{display:inline-flex;gap:8px;margin-top:10px}
    .qr{margin-top:14px;max-width:120px}
  </style>
</head>
<body>
  <main class="card" role="main">
    <img class="avatar" src="https://placehold.co/200x200?text=Avatar" alt="Avatar">
    <h1>Lord.milka</h1>
    <p class="desc">Retrouvez-moi ici — cliquez sur un des liens pour accéder à mes réseaux.</p>

    <div class="links">
      <a class="link" href="https://instagram.com/TON_PSEUDO" target="_blank" rel="noopener">Instagram</a>
      <a class="link" href="https://twitter.com/TON_PSEUDO" target="_blank" rel="noopener">X (Twitter)</a>
      <a class="link" href="https://facebook.com/TON_PSEUDO" target="_blank" rel="noopener">Facebook</a>
      <a class="link" href="https://youtube.com/TON_PSEUDO" target="_blank" rel="noopener">YouTube</a>
      <a class="link" href="mailto:ton@email" target="_blank" rel="noopener">Email</a>
      <!-- Ajoute/supprime des lignes ci-dessous selon tes besoins -->
    </div>

    <div class="small">
      <div class="icons">
        <!-- petites icônes optionnelles — remplace ou supprime -->
        <span>🌐</span>
        <span>🔗</span>
      </div>
      <div style="margin-top:8px">Partage : https://tondomaineougithubpage.example</div>
    </div>
  </main>
</body>
</html>
