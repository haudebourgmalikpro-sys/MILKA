<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MILKA • Réseaux</title>
  <meta name="description" content="Tous les réseaux de MILKA" />
  <meta name="theme-color" content="#9A0002" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --cherry: #9A0002;
      --cream: #EFE6DE;
      --cherry-700: #7f0002;
      --cherry-500: #b30707;
      --cream-800: #d9cfc7;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: 'Poppins', system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--cherry);
      background: radial-gradient(1200px 800px at 20% -10%, rgba(154,0,2,.12), rgba(154,0,2,0)) ,
                  radial-gradient(1000px 700px at 120% 10%, rgba(154,0,2,.10), rgba(154,0,2,0)) ,
                  var(--cream);
      display: grid;
      place-items: center;
      overflow-x: hidden;
    }
    .wrap {
      width: min(680px, 92vw);
      position: relative;
      padding: 28px;
    }
    .card {
      background: rgba(255,255,255,0.55);
      border: 1px solid var(--cream-800);
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(154,0,2,0.15);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      overflow: hidden;
      animation: floatIn .8s ease-out both;
    }
    .hero {
      position: relative;
      padding: 60px 24px 24px;
      text-align: center;
      background: linear-gradient(180deg, rgba(154,0,2,.14), rgba(154,0,2,0));
      border-bottom: 1px dashed var(--cream-800);
    }
    .pfp {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 6px solid var(--cream);
      outline: 4px solid var(--cherry);
      box-shadow: 0 10px 30px rgba(154,0,2,0.28);
      transform: translateY(10px);
      transition: transform .3s ease;
      background: #fff;
    }
    .pfp:hover { transform: translateY(6px) scale(1.02); }
    h1 {
      margin: 18px 0 6px;
      font-size: 2rem;
      line-height: 1.1;
      letter-spacing: .5px;
      font-weight: 800;
      color: var(--cherry);
      text-transform: uppercase;
    }
    .tagline {
      margin: 0 0 12px;
      color: #6b1111;
      font-weight: 600;
      opacity: .85;
    }
    .links {
      display: grid;
      gap: 14px;
      padding: 22px;
    }
    .btn {
      --r: 14px;
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      background: var(--cherry);
      color: var(--cream);
      padding: 16px 18px;
      border-radius: var(--r);
      border: 1px solid var(--cherry-700);
      box-shadow: 0 10px 20px rgba(154,0,2,0.25);
      transition: transform .14s ease, box-shadow .2s ease, background .2s ease;
      position: relative;
      isolation: isolate;
      overflow: hidden;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 14px 28px rgba(154,0,2,0.32); background: var(--cherry-500); }
    .btn:active { transform: translateY(0); }
    .btn .icon { width: 26px; height: 26px; flex: 0 0 auto; fill: var(--cream); }
    .btn .text { font-weight: 600; letter-spacing: .3px; }
    .btn .meta { margin-left: auto; opacity: .9; font-weight: 600; }

    .footer {
      padding: 16px 22px 26px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      color: #6b1111;
    }
    .copy { font-size: 12px; opacity: .8; }

    /* Ripple effect */
    .btn::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(255,255,255,.25), transparent 40%);
      opacity: 0;
      transition: opacity .3s ease;
      pointer-events: none;
      z-index: 0;
    }
    .btn:hover::after { opacity: 1; }
    .btn > * { position: relative; z-index: 1; }

    /* Simple stagger animation */
    @keyframes floatIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .links .btn { animation: floatIn .7s ease both; }
    .links .btn:nth-child(1) { animation-delay: .05s; }
    .links .btn:nth-child(2) { animation-delay: .1s; }
    .links .btn:nth-child(3) { animation-delay: .15s; }
    .links .btn:nth-child(4) { animation-delay: .2s; }
    .links .btn:nth-child(5) { animation-delay: .25s; }
    .links .btn:nth-child(6) { animation-delay: .3s; }

    /* Floating decorative dots */
    .bg-dot { position: absolute; border-radius: 50%; filter: blur(6px); opacity: .14; background: var(--cherry); animation: drift 16s ease-in-out infinite; }
    .dot1 { width: 160px; height: 160px; left: -40px; top: -40px; }
    .dot2 { width: 120px; height: 120px; right: -30px; top: 30%; animation-duration: 18s; }
    .dot3 { width: 140px; height: 140px; left: 20px; bottom: -50px; animation-duration: 22s; }
    @keyframes drift { 0%,100%{ transform: translateY(0) } 50% { transform: translateY(16px) } }

    /* Responsive */
    @media (min-width: 560px) {
      .links { grid-template-columns: 1fr 1fr; }
    }
    .music-btn {
      position: fixed;
      right: 20px;
      bottom: 20px;
      background: var(--cherry);
      color: var(--cream);
      border: 1px solid var(--cherry-700);
      border-radius: 999px;
      padding: 10px 16px;
      font-weight: 700;
      letter-spacing: .3px;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(154,0,2,0.25);
      transition: transform .12s ease, box-shadow .2s ease, background .2s ease;
      z-index: 10;
    }
    .music-btn:hover { transform: translateY(-1px); box-shadow: 0 12px 24px rgba(154,0,2,0.32); }
    .music-btn:active { transform: translateY(0); }
  </style>
</head>

    <!-- Musique YouTube: lecture auto muet + boucle -->
    <iframe id="ytbg" title="Musique" width="0" height="0" style="position: absolute; opacity:0; pointer-events:none;" src="https://www.youtube.com/embed/9Vipv-DZXx4?autoplay=0&mute=1&loop=1&playlist=9Vipv-DZXx4&controls=0&modestbranding=1" allow="autoplay; encrypted-media" referrerpolicy="strict-origin-when-cross-origin"></iframe>
    <button id="musicBtn" class="music-btn" type="button" aria-pressed="false" aria-label="Activer la musique">Musique: Off</button>
  </div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    document.getElementById('y').textContent = new Date().getFullYear();
    document.querySelectorAll('.btn').forEach(btn => {
      btn.addEventListener('pointermove', e => {
        const rect = btn.getBoundingClientRect();
        btn.style.setProperty('--x', (e.clientX - rect.left) + 'px');
        btn.style.setProperty('--y', (e.clientY - rect.top) + 'px');
      });
    });

    let player;
    function onYouTubeIframeAPIReady() {
      player = new YT.Player('ytbg', {
        events: {
          'onReady': () => {
            const btn = document.getElementById('musicBtn');
            btn.addEventListener('click', () => {
              if (!player) return;
              const state = player.getPlayerState();
              if (state === YT.PlayerState.PLAYING) {
                player.pauseVideo();
                btn.textContent = 'Musique: Off';
                btn.setAttribute('aria-pressed', 'false');
              } else {
                player.mute();
                player.playVideo();
                btn.textContent = 'Musique: On';
                btn.setAttribute('aria-pressed', 'true');
              }
            });
          }
        }
      });
    }
  </script>
